<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ammara — Dev Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #e8d5b0;
  --sand-mid: #c9b48a;
  --sand-dark: #9e845f;
  --gold: #d4952a;
  --gold-bright: #f0b84a;
  --gold-dim: rgba(212,149,42,0.15);
  --ink: #130e07;
  --ink-2: #1e1609;
  --ink-3: #2a1d0e;
  --lapis: #1e3a5f;
  --lapis-glow: rgba(45,84,144,0.4);
  --terra: #c4622d;
  --terra-glow: rgba(196,98,45,0.3);
  --oasis: #2d6b5a;
  --parchment: #f5ead0;
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out: cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--sand);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── BACKGROUND ─── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.bg-canvas canvas { width: 100%; height: 100%; opacity: 0.5; }
.bg-grad {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 100% 60% at 50% -5%, rgba(212,149,42,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 90% 110%, rgba(30,58,95,0.35) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at -10% 60%, rgba(196,98,45,0.12) 0%, transparent 50%);
}

/* ─── SPLASH ─── */
.splash {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--ink);
  transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
}
.splash.out { opacity: 0; pointer-events: none; transform: scale(1.04); }
.splash-logo {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  letter-spacing: 0.2em;
  color: var(--gold-bright);
  text-shadow: 0 0 60px rgba(212,149,42,0.6), 0 0 120px rgba(212,149,42,0.2);
  animation: pulseGold 2s ease infinite;
}
.splash-sub {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--sand-dark);
  margin-top: 8px;
  font-family: 'Cinzel', serif;
}
.splash-bar {
  width: 120px; height: 2px;
  background: rgba(212,149,42,0.2);
  border-radius: 1px;
  margin-top: 28px;
  overflow: hidden;
}
.splash-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  border-radius: 1px;
  animation: loadBar 1.4s var(--ease-out) forwards;
}
@keyframes loadBar { from { width: 0 } to { width: 100% } }
@keyframes pulseGold {
  0%,100% { text-shadow: 0 0 40px rgba(212,149,42,0.5); }
  50% { text-shadow: 0 0 80px rgba(212,149,42,0.8), 0 0 160px rgba(212,149,42,0.3); }
}

/* ─── WRAPPER ─── */
#app { position: relative; z-index: 1; opacity: 0; transform: translateY(16px); transition: opacity 0.6s var(--ease-out), transform 0.6s var(--ease-out); }
#app.visible { opacity: 1; transform: translateY(0); }

/* ─── HEADER ─── */
.header {
  text-align: center;
  padding: 30px 20px 18px;
  border-bottom: 1px solid rgba(212,149,42,0.2);
  background: linear-gradient(180deg, rgba(19,14,7,0.98) 0%, rgba(19,14,7,0.0) 100%);
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: -1px; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer {
  0% { opacity: 0.3; transform: scaleX(0.6); }
  50% { opacity: 1; transform: scaleX(1); }
  100% { opacity: 0.3; transform: scaleX(0.6); }
}

.ornament-row {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 8px;
}
.orn-line { flex: 1; max-width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim) 70%, var(--gold)); }
.orn-line.r { background: linear-gradient(90deg, var(--gold), var(--gold-dim) 30%, transparent); }
.orn-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 8px var(--gold); }

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 24px; font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--gold-bright);
  text-shadow: 0 0 40px rgba(212,149,42,0.4);
  line-height: 1;
}
.header h1 small {
  display: block;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.4em;
  color: var(--sand-dark);
  margin-top: 6px;
  font-family: 'Crimson Pro', serif;
  font-style: italic;
}

/* ─── NAV ─── */
.nav {
  position: sticky; top: 0; z-index: 20;
  display: flex;
  background: rgba(13,10,5,0.96);
  border-bottom: 1px solid rgba(212,149,42,0.15);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
}
.nav-btn {
  flex: 1; padding: 13px 4px;
  background: none; border: none;
  color: var(--sand-dark);
  font-family: 'Cinzel', serif;
  font-size: 8.5px; letter-spacing: 0.1em;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  position: relative;
  transition: color 0.25s ease;
}
.nav-btn .icon { font-size: 17px; line-height: 1; transition: transform 0.3s var(--ease-spring); }
.nav-btn.active { color: var(--gold-bright); }
.nav-btn.active .icon { transform: scale(1.15); }

.nav-ink {
  position: absolute;
  bottom: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 2px 2px 0 0;
  transition: left 0.35s var(--ease-out), width 0.35s var(--ease-out);
}
.nav-badge {
  position: absolute; top: 7px; right: calc(50% - 18px);
  background: var(--terra);
  color: #fff; font-size: 8px;
  width: 14px; height: 14px;
  border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  font-weight: 700;
  animation: badgePop 0.3s var(--ease-spring);
}
@keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

/* ─── MAIN ─── */
main {
  max-width: 480px; margin: 0 auto;
  padding-bottom: 90px;
  position: relative; overflow: hidden;
}
.section { display: none; }
.section.active { display: block; }

/* Tab slide transitions */
.section.slide-in-right { animation: slideInR 0.32s var(--ease-out) both; }
.section.slide-in-left  { animation: slideInL 0.32s var(--ease-out) both; }
@keyframes slideInR { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideInL { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: translateX(0); } }

/* ─── SECTION HEADER ─── */
.sec-header {
  padding: 20px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.sec-title {
  font-family: 'Cinzel', serif;
  font-size: 13px; letter-spacing: 0.14em;
  color: var(--gold);
}

.btn-add {
  background: var(--gold);
  color: var(--ink);
  border: none; width: 34px; height: 34px;
  border-radius: 50%; font-size: 22px; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 300;
  box-shadow: 0 2px 14px rgba(212,149,42,0.45), 0 0 0 0 rgba(212,149,42,0.4);
  transition: transform 0.2s var(--ease-spring), box-shadow 0.2s;
}
.btn-add:active { transform: scale(0.88); box-shadow: 0 1px 6px rgba(212,149,42,0.3); }

/* ─── IMPORT BAR ─── */
.import-bar {
  margin: 0 16px 12px;
  display: flex; gap: 8px;
}
.btn-import {
  flex: 1;
  background: rgba(212,149,42,0.07);
  border: 1px dashed rgba(212,149,42,0.35);
  color: var(--sand-mid);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.1em;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: background 0.2s, border-color 0.2s;
}
.btn-import:active { background: rgba(212,149,42,0.15); border-color: var(--gold); }
.btn-import .import-icon { font-size: 14px; }

input[type=file] { display: none; }

/* ─── CARDS ─── */
.cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

.card {
  background: rgba(245,234,208,0.045);
  border: 1px solid rgba(212,149,42,0.18);
  border-radius: 12px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
  transform: translateY(0);
  transition: border-color 0.2s, transform 0.2s var(--ease-spring), box-shadow 0.2s;
  animation: cardIn 0.4s var(--ease-out) both;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,149,42,0.3), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.card:active { transform: translateY(1px) scale(0.99); border-color: rgba(212,149,42,0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.card:active::before { opacity: 1; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger via nth-child */
.card:nth-child(1) { animation-delay: 0.04s; }
.card:nth-child(2) { animation-delay: 0.08s; }
.card:nth-child(3) { animation-delay: 0.12s; }
.card:nth-child(4) { animation-delay: 0.16s; }
.card:nth-child(5) { animation-delay: 0.20s; }
.card:nth-child(n+6) { animation-delay: 0.22s; }

.card-imported::after {
  content: '✦ CLAUDE';
  position: absolute; top: 10px; right: 12px;
  font-size: 7px; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  color: var(--gold); opacity: 0.6;
}

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 13px; color: var(--parchment);
  line-height: 1.35; flex: 1;
}
.card-meta {
  font-size: 12.5px; color: var(--sand-dark);
  margin-top: 6px; line-height: 1.6;
  font-style: italic;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; align-items: center; }

.tag {
  font-size: 8.5px; font-family: 'Cinzel', serif;
  letter-spacing: 0.08em; padding: 2px 9px;
  border-radius: 20px; border: 1px solid;
  transition: background 0.15s;
}
.tag-idea  { color: var(--gold); border-color: rgba(212,149,42,0.5); background: rgba(212,149,42,0.08); }
.tag-bug   { color: #e07a52; border-color: rgba(196,98,45,0.5); background: rgba(196,98,45,0.08); }
.tag-task  { color: #7eb8a0; border-color: rgba(45,107,90,0.5); background: rgba(45,107,90,0.1); }
.tag-done  { color: #666; border-color: rgba(100,100,100,0.3); background: transparent; text-decoration: line-through; }
.tag-date  { color: var(--sand-dark); border-color: transparent; margin-left: auto; font-style: italic; font-family: 'Crimson Pro', serif; font-size: 10px; }

.card-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-sm {
  font-size: 9.5px; font-family: 'Cinzel', serif;
  letter-spacing: 0.06em; padding: 5px 11px;
  border-radius: 5px;
  border: 1px solid rgba(212,149,42,0.25);
  background: rgba(212,149,42,0.07);
  color: var(--sand); cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-sm:active { background: rgba(212,149,42,0.2); transform: scale(0.95); }
.btn-sm.danger { border-color: rgba(196,98,45,0.35); color: #e07a52; background: rgba(196,98,45,0.05); }

.prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.p-high { background: var(--terra); box-shadow: 0 0 6px rgba(196,98,45,0.6); }
.p-med  { background: var(--gold); }
.p-low  { background: var(--oasis); }

/* ─── DIVIDER ─── */
.divider {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px 4px;
}
.divider span {
  font-family: 'Cinzel', serif; font-size: 8.5px;
  letter-spacing: 0.18em; color: var(--sand-dark); white-space: nowrap;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(212,149,42,0.12);
}

/* ─── MILESTONES ─── */
.ms-card {
  margin: 0 16px 12px;
  background: rgba(30,58,95,0.18);
  border: 1px solid rgba(45,84,144,0.35);
  border-radius: 12px; padding: 16px;
  animation: cardIn 0.4s var(--ease-out) both;
}
.ms-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.ms-title { font-family: 'Cinzel', serif; font-size: 13px; color: #8ec8e0; }
.ms-ver {
  font-size: 9.5px; font-family: 'Cinzel', serif;
  letter-spacing: 0.1em; color: var(--sand-dark);
  background: rgba(30,58,95,0.5); padding: 3px 9px; border-radius: 20px;
}
.prog-outer { height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin: 2px 0 7px; }
.prog-inner {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #2d5490, #8ec8e0);
  transition: width 0.7s var(--ease-out);
}
.prog-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--sand-dark); }
.ms-tasks { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
.ms-task { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--sand); }
.task-chk {
  width: 16px; height: 16px; flex-shrink: 0;
  border: 1px solid rgba(142,200,224,0.4); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s var(--ease-spring);
}
.task-chk:active { transform: scale(0.88); }
.task-chk.done { background: #2d5490; border-color: #2d5490; }
.task-txt.done { text-decoration: line-through; color: var(--sand-dark); }

.btn-outline-ms {
  display: block;
  margin: 4px 16px 0;
  background: transparent;
  border: 1px dashed rgba(45,84,144,0.4);
  color: #8ec8e0;
  padding: 9px; border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em;
  cursor: pointer; text-align: center;
  width: calc(100% - 32px);
  transition: background 0.15s;
}
.btn-outline-ms:active { background: rgba(30,58,95,0.25); }

/* ─── STATS ─── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
.stat-card {
  background: rgba(245,234,208,0.04);
  border: 1px solid rgba(212,149,42,0.17);
  border-radius: 12px; padding: 16px; text-align: center;
  animation: cardIn 0.4s var(--ease-out) both;
  overflow: hidden; position: relative;
}
.stat-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.stat-val {
  font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700;
  line-height: 1; color: var(--gold-bright);
  animation: countIn 0.5s var(--ease-out);
}
@keyframes countIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
.stat-lbl { font-size: 9px; font-family: 'Cinzel', serif; letter-spacing: 0.1em; color: var(--sand-dark); margin-top: 5px; }

.bal-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid rgba(212,149,42,0.07);
  transition: background 0.15s;
}
.bal-row:active { background: rgba(212,149,42,0.04); }
.bal-name { font-size: 13px; flex: 1; color: var(--parchment); }
.bal-bar-wrap { flex: 2; }
.bal-bar { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.bal-fill { height: 100%; border-radius: 3px; transition: width 0.8s var(--ease-out); }
.bal-val { font-size: 10.5px; color: var(--sand-dark); width: 26px; text-align: right; font-family: 'Cinzel', serif; }
.bal-edit { font-size: 13px; color: var(--sand-dark); background: none; border: none; cursor: pointer; padding: 2px 4px; transition: color 0.15s; }
.bal-edit:active { color: var(--gold); }

.btn-add-metric {
  display: block; margin: 8px 16px 0;
  background: transparent;
  border: 1px dashed rgba(212,149,42,0.3);
  color: var(--gold); padding: 10px;
  border-radius: 8px; font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.1em;
  cursor: pointer; text-align: center;
  width: calc(100% - 32px);
  transition: background 0.15s;
}
.btn-add-metric:active { background: rgba(212,149,42,0.08); }

/* ─── MODAL ─── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(5,3,1,0.82);
  backdrop-filter: blur(6px) saturate(0.8);
  -webkit-backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: linear-gradient(160deg, #2e2010 0%, #1a1209 60%, #130e07 100%);
  border: 1px solid rgba(212,149,42,0.3);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 480px;
  padding: 26px 20px 44px;
  animation: modalUp 0.38s var(--ease-spring);
  box-shadow: 0 -20px 60px rgba(0,0,0,0.5), 0 -2px 0 rgba(212,149,42,0.15);
}
@keyframes modalUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-handle { width: 36px; height: 4px; background: rgba(212,149,42,0.25); border-radius: 2px; margin: 0 auto 20px; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.12em; color: var(--gold); }
.modal-close { background: none; border: none; color: var(--sand-dark); font-size: 24px; cursor: pointer; line-height: 1; padding: 0 2px; transition: color 0.15s, transform 0.15s; }
.modal-close:active { color: var(--gold-bright); transform: rotate(90deg) scale(0.9); }

.form-g { margin-bottom: 14px; }
label { display: block; font-size: 9.5px; font-family: 'Cinzel', serif; letter-spacing: 0.12em; color: var(--sand-dark); margin-bottom: 6px; }
input[type=text], textarea, select {
  width: 100%;
  background: rgba(245,234,208,0.055);
  border: 1px solid rgba(212,149,42,0.22);
  border-radius: 9px; padding: 11px 13px;
  color: var(--parchment); font-family: 'Crimson Pro', serif; font-size: 15px;
  outline: none; -webkit-appearance: none; appearance: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
input[type=text]:focus, textarea:focus, select:focus {
  border-color: var(--gold);
  background: rgba(245,234,208,0.08);
  box-shadow: 0 0 0 3px rgba(212,149,42,0.08);
}
textarea { resize: none; height: 78px; }
select option { background: #2a1d0e; }

.btn-submit {
  width: 100%; background: var(--gold); color: var(--ink);
  border: none; border-radius: 9px; padding: 14px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.12em; font-weight: 700;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 4px 20px rgba(212,149,42,0.35);
  transition: background 0.2s, transform 0.15s var(--ease-spring), box-shadow 0.2s;
}
.btn-submit:active { background: var(--gold-bright); transform: scale(0.97); box-shadow: 0 2px 10px rgba(212,149,42,0.2); }

/* Range */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 3px; outline: none; padding: 0; border: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gold); cursor: pointer;
  box-shadow: 0 0 8px rgba(212,149,42,0.4);
  transition: transform 0.15s var(--ease-spring);
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }
.range-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.range-row span { font-size: 12px; color: var(--gold-bright); font-family: 'Cinzel', serif; width: 30px; text-align: right; }

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center; padding: 52px 28px;
  color: var(--sand-dark); font-style: italic; font-size: 14px; line-height: 1.8;
  animation: fadeIn 0.5s ease;
}
.empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.3; display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 90px; left: 50%; z-index: 300;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,22,8,0.96);
  border: 1px solid rgba(212,149,42,0.4);
  color: var(--sand); font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.1em;
  padding: 10px 20px; border-radius: 30px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s var(--ease-spring);
  white-space: nowrap; max-width: 90vw;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-logo">AMMARA</div>
  <div class="splash-sub">DEV COMPANION</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- BG -->
<div class="bg-grad"></div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="ornament-row">
      <div class="orn-line"></div>
      <div class="orn-diamond"></div>
      <div class="orn-line r"></div>
    </div>
    <h1>AMMARA <small>Las Tres Maravillas · Dev Companion</small></h1>
  </div>

  <nav class="nav" id="nav">
    <button class="nav-btn active" data-tab="ideas" onclick="showTab('ideas',0)">
      <span class="icon">✦</span>IDEAS
    </button>
    <button class="nav-btn" data-tab="bugs" onclick="showTab('bugs',1)">
      <span class="icon">⚑</span>BUGS
      <span class="nav-badge" id="badge-bugs">0</span>
    </button>
    <button class="nav-btn" data-tab="progreso" onclick="showTab('progreso',2)">
      <span class="icon">◈</span>PROGRESO
    </button>
    <button class="nav-btn" data-tab="stats" onclick="showTab('stats',3)">
      <span class="icon">⊞</span>STATS
    </button>
    <div class="nav-ink" id="nav-ink"></div>
  </nav>

  <main id="main">
    <!-- IDEAS -->
    <div class="section active" id="sec-ideas">
      <div class="sec-header">
        <span class="sec-title">NOTAS DE DISEÑO</span>
        <button class="btn-add" onclick="openModal('idea')">+</button>
      </div>
      <div class="import-bar">
        <button class="btn-import" onclick="document.getElementById('file-import').click()">
          <span class="import-icon">⬆</span>IMPORTAR IDEAS DE CLAUDE (.json)
        </button>
        <input type="file" id="file-import" accept=".json" onchange="importJSON(event)">
      </div>
      <div class="cards" id="list-ideas"></div>
    </div>

    <!-- BUGS -->
    <div class="section" id="sec-bugs">
      <div class="sec-header">
        <span class="sec-title">BUGS & TAREAS</span>
        <button class="btn-add" onclick="openModal('bug')">+</button>
      </div>
      <div class="divider"><span>PENDIENTES</span></div>
      <div class="cards" id="list-pending"></div>
      <div class="divider" id="div-done" style="display:none"><span>RESUELTOS</span></div>
      <div class="cards" id="list-done"></div>
    </div>

    <!-- PROGRESO -->
    <div class="section" id="sec-progreso">
      <div class="sec-header">
        <span class="sec-title">HITOS & VERSIONES</span>
        <button class="btn-add" onclick="openModal('milestone')">+</button>
      </div>
      <div id="list-milestones"></div>
    </div>

    <!-- STATS -->
    <div class="section" id="sec-stats">
      <div class="sec-header">
        <span class="sec-title">ESTADÍSTICAS DEL JUEGO</span>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="divider" style="margin-top:16px"><span>BALANCE DE MECÁNICAS</span></div>
      <div id="list-balance"></div>
      <button class="btn-add-metric" onclick="openModal('balance')">+ Añadir métrica de balance</button>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title" id="modal-title">NUEVA IDEA</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
let S = JSON.parse(localStorage.getItem('ammara_v2') || 'null') || {
  ideas: [],
  bugs: [],
  milestones: [],
  balance: [
    { name: 'Economía',    value: 65, color: '#d4952a' },
    { name: 'Dificultad',  value: 50, color: '#c4622d' },
    { name: 'Progresión',  value: 70, color: '#2d6b5a' },
    { name: 'Rendimiento', value: 80, color: '#2d5490' },
  ]
};
let modalType = null, editTarget = null;
let currentTabIdx = 0;

function persist() { localStorage.setItem('ammara_v2', JSON.stringify(S)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function dateStr(ts) {
  return new Date(ts).toLocaleDateString('es-ES', { day:'2-digit', month:'short' });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════
const TABS = ['ideas','bugs','progreso','stats'];

function showTab(name, idx) {
  const dir = idx > currentTabIdx ? 'right' : 'left';
  const prev = document.querySelector('.section.active');
  if (prev) prev.classList.remove('active');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');

  const next = document.getElementById('sec-'+name);
  next.classList.add('active');
  // direction animation
  void next.offsetWidth; // force reflow
  next.classList.remove('slide-in-right','slide-in-left');
  next.classList.add(dir === 'right' ? 'slide-in-right' : 'slide-in-left');

  currentTabIdx = idx;
  updateNavInk();
  render();
}

function updateNavInk() {
  const active = document.querySelector('.nav-btn.active');
  if (!active) return;
  const ink = document.getElementById('nav-ink');
  ink.style.left = active.offsetLeft + 'px';
  ink.style.width = active.offsetWidth + 'px';
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  renderIdeas();
  renderBugs();
  renderMilestones();
  renderStats();
  renderBadge();
}

/* IDEAS */
function renderIdeas() {
  const el = document.getElementById('list-ideas');
  if (!S.ideas.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">✦</span>Sin ideas anotadas.<br>Pulsa + para escribir una,<br>o importa un archivo JSON de Claude.</div>`;
    return;
  }
  el.innerHTML = S.ideas.map(i => `
    <div class="card${i.fromClaude ? ' card-imported' : ''}">
      <div class="card-top">
        <div class="card-title">${esc(i.title)}</div>
      </div>
      ${i.desc ? `<div class="card-meta">${esc(i.desc)}</div>` : ''}
      <div class="card-tags">
        <span class="tag tag-idea">${esc(i.cat||'DISEÑO')}</span>
        <span class="tag tag-date">${dateStr(i.ts)}</span>
      </div>
      <div class="card-actions">
        <button class="btn-sm" onclick="editIdea('${i.id}')">Editar</button>
        <button class="btn-sm danger" onclick="delIdea('${i.id}')">Eliminar</button>
      </div>
    </div>`).join('');
}

/* BUGS */
function renderBugs() {
  const pending = S.bugs.filter(b => !b.done);
  const done    = S.bugs.filter(b =>  b.done);

  document.getElementById('list-pending').innerHTML = pending.length
    ? pending.map(bugCard).join('')
    : `<div class="empty" style="padding:28px 28px"><span class="empty-icon" style="font-size:28px">✓</span>Sin bugs pendientes.</div>`;

  document.getElementById('div-done').style.display = done.length ? 'flex' : 'none';
  document.getElementById('list-done').innerHTML = done.map(bugCard).join('');
}
function bugCard(b) {
  const pc = b.prio==='alta' ? 'p-high' : b.prio==='media' ? 'p-med' : 'p-low';
  const tc = b.done ? 'tag-done' : b.type==='bug' ? 'tag-bug' : 'tag-task';
  return `
    <div class="card">
      <div class="card-top">
        <div class="prio-dot ${pc}"></div>
        <div class="card-title" style="${b.done?'color:var(--sand-dark);text-decoration:line-through':''}">${esc(b.title)}</div>
      </div>
      ${b.desc?`<div class="card-meta">${esc(b.desc)}</div>`:''}
      <div class="card-tags">
        <span class="tag ${tc}">${b.type==='bug'?'BUG':'TAREA'}</span>
        <span class="tag" style="color:var(--sand-dark);border-color:rgba(255,255,255,0.08)">${(b.prio||'media').toUpperCase()}</span>
        <span class="tag tag-date">${dateStr(b.ts)}</span>
      </div>
      <div class="card-actions">
        <button class="btn-sm" onclick="toggleBug('${b.id}')">${b.done?'Reabrir':'Resolver ✓'}</button>
        <button class="btn-sm danger" onclick="delBug('${b.id}')">Eliminar</button>
      </div>
    </div>`;
}

/* MILESTONES */
function renderMilestones() {
  const el = document.getElementById('list-milestones');
  if (!S.milestones.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">◈</span>Sin hitos definidos.<br>Pulsa + para crear tu primera versión.</div>`;
    return;
  }
  el.innerHTML = S.milestones.map(m => {
    const total = m.tasks.length;
    const done  = m.tasks.filter(t=>t.done).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    return `
      <div class="ms-card">
        <div class="ms-header">
          <span class="ms-title">${esc(m.title)}</span>
          <span class="ms-ver">v${esc(m.ver)}</span>
        </div>
        <div class="prog-outer"><div class="prog-inner" style="width:${pct}%"></div></div>
        <div class="prog-labels"><span>${done}/${total} tareas</span><span>${pct}%</span></div>
        <div class="ms-tasks">
          ${m.tasks.map(t=>`
            <div class="ms-task">
              <div class="task-chk ${t.done?'done':''}" onclick="toggleTask('${m.id}','${t.id}')">
                ${t.done?'✓':''}
              </div>
              <span class="task-txt ${t.done?'done':''}">${esc(t.text)}</span>
            </div>`).join('')}
        </div>
        <div class="card-actions" style="margin-top:12px">
          <button class="btn-sm" onclick="addTask('${m.id}')">+ Tarea</button>
          <button class="btn-sm danger" onclick="delMilestone('${m.id}')">Eliminar</button>
        </div>
      </div>`;
  }).join('');
}

/* STATS */
function renderStats() {
  const activeBugs = S.bugs.filter(b=>b.type==='bug'&&!b.done).length;
  const globalPct  = S.milestones.length
    ? Math.round(S.milestones.reduce((a,m)=>{
        const t=m.tasks.length; const d=m.tasks.filter(t=>t.done).length;
        return a+(t?d/t:0);
      },0)/S.milestones.length*100)
    : 0;

  const vals = [
    { v: S.ideas.length,       lbl: 'IDEAS',        c: 'var(--gold-bright)' },
    { v: activeBugs,           lbl: 'BUGS ACTIVOS',  c: 'var(--terra)' },
    { v: S.milestones.length,  lbl: 'VERSIONES',     c: '#8ec8e0' },
    { v: globalPct+'%',        lbl: 'PROGRESO',      c: '#7eb8a0' },
  ];

  document.getElementById('stats-grid').innerHTML = vals.map((s,i)=>`
    <div class="stat-card" style="animation-delay:${i*0.06}s">
      <div class="stat-val" style="color:${s.c}">${s.v}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');

  document.getElementById('list-balance').innerHTML = S.balance.map((b,i)=>`
    <div class="bal-row">
      <span class="bal-name">${esc(b.name)}</span>
      <div class="bal-bar-wrap">
        <div class="bal-bar">
          <div class="bal-fill" style="width:${b.value}%;background:${b.color}"></div>
        </div>
      </div>
      <span class="bal-val">${b.value}</span>
      <button class="bal-edit" onclick="editBalance(${i})">✎</button>
    </div>`).join('');
}

/* BADGE */
function renderBadge() {
  const n = S.bugs.filter(b=>!b.done&&b.type==='bug').length;
  const el = document.getElementById('badge-bugs');
  if (n>0) { el.style.display='flex'; el.textContent=n>9?'9+':n; }
  else { el.style.display='none'; }
}

// ═══════════════════════════════════════════
//  IMPORT JSON
// ═══════════════════════════════════════════
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const ideas = parsed.ideas || parsed; // accept array or {ideas:[...]}
      if (!Array.isArray(ideas)) throw new Error('Formato incorrecto');
      let count = 0;
      ideas.forEach(item => {
        if (item.title) {
          S.ideas.unshift({
            id: uid(),
            title: item.title,
            desc: item.desc || item.description || '',
            cat: item.category || item.cat || 'DISEÑO',
            ts: Date.now(),
            fromClaude: true
          });
          count++;
        }
      });
      persist();
      render();
      toast(`✦ ${count} idea${count!==1?'s':''} importada${count!==1?'s':''} de Claude`);
    } catch(err) {
      toast('⚑ Error al leer el archivo JSON');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function openModal(type, extra) {
  modalType = type; editTarget = extra || null;
  const ov = document.getElementById('overlay');
  const ti = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  ov.classList.add('open');

  if (type === 'idea') {
    const item = editTarget ? S.ideas.find(x=>x.id===editTarget) : null;
    ti.textContent = editTarget ? 'EDITAR IDEA' : 'NUEVA IDEA';
    const cats = ['MECÁNICA','VISUAL','AUDIO','UI/UX','NARRATIVA','RENDIMIENTO','ECONOMÍA','DISEÑO','OTRO'];
    body.innerHTML = `
      <div class="form-g"><label>TÍTULO</label><input type="text" id="fi-title" value="${item?esc(item.title):''}" placeholder="Nombre de la idea..."></div>
      <div class="form-g"><label>DESCRIPCIÓN</label><textarea id="fi-desc" placeholder="Detalla la idea...">${item?esc(item.desc):''}</textarea></div>
      <div class="form-g"><label>CATEGORÍA</label>
        <select id="fi-cat">${cats.map(c=>`<option ${item?.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      </div>
      <button class="btn-submit" onclick="submitIdea()">${editTarget?'GUARDAR CAMBIOS':'AÑADIR IDEA'}</button>`;
  }

  else if (type === 'bug') {
    ti.textContent = 'NUEVO BUG / TAREA';
    body.innerHTML = `
      <div class="form-g"><label>DESCRIPCIÓN</label><input type="text" id="fi-title" placeholder="¿Qué falla o hay que hacer?"></div>
      <div class="form-g"><label>DETALLE</label><textarea id="fi-desc" placeholder="Contexto, pasos para reproducir..."></textarea></div>
      <div class="form-g"><label>TIPO</label>
        <select id="fi-type"><option value="bug">🐛 Bug</option><option value="task">✦ Tarea</option></select>
      </div>
      <div class="form-g"><label>PRIORIDAD</label>
        <select id="fi-prio"><option value="alta">🔴 Alta</option><option value="media" selected>🟡 Media</option><option value="baja">🟢 Baja</option></select>
      </div>
      <button class="btn-submit" onclick="submitBug()">REGISTRAR</button>`;
  }

  else if (type === 'milestone') {
    ti.textContent = 'NUEVO HITO / VERSIÓN';
    body.innerHTML = `
      <div class="form-g"><label>NOMBRE</label><input type="text" id="fi-title" placeholder="Ej: Alpha pública, Sistema de comercio..."></div>
      <div class="form-g"><label>VERSIÓN</label><input type="text" id="fi-ver" placeholder="0.2"></div>
      <button class="btn-submit" onclick="submitMilestone()">CREAR HITO</button>`;
  }

  else if (type === 'task') {
    ti.textContent = 'AÑADIR TAREA';
    body.innerHTML = `
      <div class="form-g"><label>TAREA</label><input type="text" id="fi-task" placeholder="¿Qué hay que implementar?"></div>
      <button class="btn-submit" onclick="submitTask()">AÑADIR</button>`;
  }

  else if (type === 'balance') {
    const item = editTarget !== null ? S.balance[editTarget] : null;
    ti.textContent = item ? 'EDITAR MÉTRICA' : 'NUEVA MÉTRICA';
    const colors = ['#d4952a','#c4622d','#2d6b5a','#2d5490','#8ec8e0','#7eb8a0','#9b6bb5','#c97fc4'];
    body.innerHTML = `
      <div class="form-g"><label>NOMBRE</label><input type="text" id="fi-bname" value="${item?esc(item.name):''}" placeholder="Ej: Economía, Dificultad..."></div>
      <div class="form-g"><label>VALOR (0–100)</label>
        <div class="range-row">
          <input type="range" id="fi-bval" min="0" max="100" value="${item?item.value:50}" oninput="document.getElementById('bv-num').textContent=this.value">
          <span id="bv-num">${item?item.value:50}</span>
        </div>
      </div>
      <div class="form-g"><label>COLOR</label>
        <select id="fi-bcolor">${colors.map(c=>`<option value="${c}" ${item?.color===c?'selected':''}>${c}</option>`).join('')}</select>
      </div>
      <button class="btn-submit" onclick="submitBalance()">${item?'GUARDAR':'AÑADIR MÉTRICA'}</button>`;
  }

  setTimeout(() => document.querySelector('#modal-body input, #modal-body textarea')?.focus(), 80);
}

function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); modalType = null; editTarget = null; }

// ═══════════════════════════════════════════
//  SUBMITS
// ═══════════════════════════════════════════
function submitIdea() {
  const t = document.getElementById('fi-title').value.trim(); if(!t) return;
  if (editTarget) {
    const i = S.ideas.find(x=>x.id===editTarget);
    i.title = t; i.desc = document.getElementById('fi-desc').value.trim(); i.cat = document.getElementById('fi-cat').value;
  } else {
    S.ideas.unshift({ id:uid(), title:t, desc:document.getElementById('fi-desc').value.trim(), cat:document.getElementById('fi-cat').value, ts:Date.now() });
  }
  persist(); closeModal(); render(); toast('✦ Idea guardada');
}

function submitBug() {
  const t = document.getElementById('fi-title').value.trim(); if(!t) return;
  S.bugs.unshift({ id:uid(), title:t, desc:document.getElementById('fi-desc').value.trim(), type:document.getElementById('fi-type').value, prio:document.getElementById('fi-prio').value, done:false, ts:Date.now() });
  persist(); closeModal(); render(); toast('⚑ Registrado');
}

function submitMilestone() {
  const t = document.getElementById('fi-title').value.trim(); if(!t) return;
  S.milestones.push({ id:uid(), title:t, ver:document.getElementById('fi-ver').value.trim()||'?', tasks:[], ts:Date.now() });
  persist(); closeModal(); render(); toast('◈ Hito creado');
}

function submitTask() {
  const t = document.getElementById('fi-task').value.trim(); if(!t||!editTarget) return;
  const m = S.milestones.find(x=>x.id===editTarget);
  if(m) m.tasks.push({ id:uid(), text:t, done:false });
  persist(); closeModal(); render();
}

function submitBalance() {
  const n = document.getElementById('fi-bname').value.trim(); if(!n) return;
  const entry = { name:n, value:parseInt(document.getElementById('fi-bval').value), color:document.getElementById('fi-bcolor').value };
  if (editTarget !== null) S.balance[editTarget] = entry;
  else S.balance.push(entry);
  persist(); closeModal(); render(); toast('⊞ Métrica actualizada');
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
function delIdea(id)    { S.ideas = S.ideas.filter(x=>x.id!==id); persist(); render(); }
function editIdea(id)   { openModal('idea', id); }
function delBug(id)     { S.bugs = S.bugs.filter(x=>x.id!==id); persist(); render(); }
function toggleBug(id)  { const b=S.bugs.find(x=>x.id===id); if(b) b.done=!b.done; persist(); render(); }
function delMilestone(id){ S.milestones=S.milestones.filter(x=>x.id!==id); persist(); render(); }
function addTask(mid)   { openModal('task', mid); }
function toggleTask(mid,tid) {
  const m=S.milestones.find(x=>x.id===mid);
  if(m){ const t=m.tasks.find(x=>x.id===tid); if(t) t.done=!t.done; }
  persist(); render();
}
function editBalance(i) { openModal('balance', i); }

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(()=>{
    document.getElementById('splash').classList.add('out');
    setTimeout(()=>{
      document.getElementById('splash').style.display='none';
      document.getElementById('app').classList.add('visible');
      updateNavInk();
      render();
    }, 800);
  }, 1500);
});

window.addEventListener('resize', updateNavInk);
</script>
</body>
</html>
